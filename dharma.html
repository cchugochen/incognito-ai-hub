<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__MSG_dharmaTitle__</title>
<link rel="stylesheet" href="styles/themes.css">
<link rel="stylesheet" href="dharma.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-content">

<!-- No API key banner (hidden by default, shown by JS) -->
<div class="no-key-banner hidden" id="noKeyBanner">
  <span data-i18n="dharmaNoApiKeyBefore"></span> <a href="options.html" id="openOptionsLink" data-i18n="dharmaNoApiKeyLink"></a> <span data-i18n="dharmaNoApiKeyAfter"></span>
</div>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title" data-i18n="dharmaHeaderTitle"></div>
    <div class="header-sub" data-i18n="dharmaHeaderSub"></div>
  </div>
  <button class="info-toggle" id="infoBtn" data-i18n="dharmaAboutBtn"></button>
</div>

<!-- Intro panel -->
<div class="intro-panel" id="introPanel">
  <div class="intro-body">
    <p data-i18n="dharmaIntroP1"></p>
    <p data-i18n="dharmaIntroP2"></p>

    <div class="intro-traditions">
      <div class="itrad-detail">
        <div class="itrad-header" data-i18n="dharmaTibIntroHdr"></div>
        <p data-i18n="dharmaTibIntroP1"></p>
        <p data-i18n="dharmaTibIntroP2"></p>
      </div>

      <div class="itrad-detail">
        <div class="itrad-header" data-i18n="dharmaZenIntroHdr"></div>
        <p data-i18n="dharmaZenIntroP1"></p>
        <p data-i18n="dharmaZenIntroP2"></p>
      </div>

      <div class="itrad-detail">
        <div class="itrad-header" data-i18n="dharmaHumIntroHdr"></div>
        <p data-i18n="dharmaHumIntroP1"></p>
        <p data-i18n="dharmaHumIntroP2"></p>
      </div>
    </div>

    <p class="intro-closing" data-i18n="dharmaIntroClosing"></p>
  </div>
</div>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab act-cmp" data-v="compare" data-i18n="dharmaTabCompare"></button>
  <button class="tab" data-v="tib" data-i18n="dharmaTabTib"></button>
  <button class="tab" data-v="zen" data-i18n="dharmaTabZen"></button>
  <button class="tab" data-v="hum" data-i18n="dharmaTabHum"></button>
</div>

<!-- COMPARE VIEW -->
<div class="view active" id="view-compare">
  <div class="compare-cols">
    <div class="col tib-col">
      <div class="col-hdr tib"><span data-i18n="dharmaCmpColTibLabel"></span><span class="trad-tag" data-i18n="dharmaCmpColTibTag"></span></div>
      <div class="messages" id="cmp-tib"><div class="welcome"><div class="wi">🙏</div><div class="wn" data-i18n="dharmaCmpTibWelcomeName"></div><div class="wd" data-i18n="dharmaCmpTibWelcomeDesc"></div><div class="ws" data-i18n="dharmaCmpTibWelcomeSub"></div></div></div>
    </div>
    <div class="col zen-col">
      <div class="col-hdr zen"><span data-i18n="dharmaCmpColZenLabel"></span><span class="trad-tag" data-i18n="dharmaCmpColZenTag"></span></div>
      <div class="messages" id="cmp-zen"><div class="welcome"><div class="wi">⛰️</div><div class="wn" data-i18n="dharmaCmpZenWelcomeName"></div><div class="wd" data-i18n="dharmaCmpZenWelcomeDesc"></div><div class="ws" data-i18n="dharmaCmpZenWelcomeSub"></div></div></div>
    </div>
    <div class="col hum-col">
      <div class="col-hdr hum"><span data-i18n="dharmaCmpColHumLabel"></span><span class="trad-tag" data-i18n="dharmaCmpColHumTag"></span></div>
      <div class="messages" id="cmp-hum"><div class="welcome"><div class="wi">🪷</div><div class="wn" data-i18n="dharmaCmpHumWelcomeName"></div><div class="wd" data-i18n="dharmaCmpHumWelcomeDesc"></div><div class="ws" data-i18n="dharmaCmpHumWelcomeSub"></div></div></div>
    </div>
  </div>
  <div class="inp-row ci">
    <textarea id="cmp-input" data-i18n-placeholder="dharmaCmpInputPlaceholder" rows="1"></textarea>
    <span class="clbl" data-i18n="dharmaCmpLabel"></span>
    <button class="sbtn c" id="cmp-send">→</button>
  </div>
  <div class="cmp-chips-bar"><div class="chips" id="cmp-chips"></div></div>
</div>

<!-- TIBETAN VIEW -->
<div class="view tib-view" id="view-tib">
  <div class="single-layout">
    <div class="messages" id="single-tib"><div class="welcome"><div class="wi">🙏</div><div class="wn" data-i18n="dharmaTibWelcomeName"></div><div class="wd" data-i18n="dharmaTibWelcomeDesc"></div><div class="ws" data-i18n="dharmaTibWelcomeSub"></div><div class="chips" id="tib-chips"></div></div></div>
    <div class="inp-row ti"><textarea id="tib-input" data-i18n-placeholder="dharmaTibInputPlaceholder" rows="1"></textarea><button class="sbtn t" id="tib-send">→</button></div>
  </div>
</div>

<!-- ZEN VIEW -->
<div class="view zen-view" id="view-zen">
  <div class="single-layout">
    <div class="messages" id="single-zen"><div class="welcome"><div class="wi">⛰️</div><div class="wn" data-i18n="dharmaZenWelcomeName"></div><div class="wd" data-i18n="dharmaZenWelcomeDesc"></div><div class="ws" data-i18n="dharmaZenWelcomeSub"></div><div class="chips" id="zen-chips"></div></div></div>
    <div class="inp-row zi"><textarea id="zen-input" data-i18n-placeholder="dharmaZenInputPlaceholder" rows="1"></textarea><button class="sbtn z" id="zen-send">→</button></div>
  </div>
</div>

<!-- HUMANISTIC VIEW -->
<div class="view hum-view" id="view-hum">
  <div class="single-layout">
    <div class="messages" id="single-hum"><div class="welcome"><div class="wi">🪷</div><div class="wn" data-i18n="dharmaHumWelcomeName"></div><div class="wd" data-i18n="dharmaHumWelcomeDesc"></div><div class="ws" data-i18n="dharmaHumWelcomeSub"></div><div class="chips" id="hum-chips"></div></div></div>
    <div class="inp-row hi"><textarea id="hum-input" data-i18n-placeholder="dharmaHumInputPlaceholder" rows="1"></textarea><button class="sbtn h" id="hum-send">→</button></div>
  </div>
</div>

</div><!-- /.main-content -->

<!-- Footer -->
<div class="app-footer">
  <div>
    <div class="footer-title" data-i18n="dharmaFooterTitle"></div>
    <div class="footer-note" data-i18n="dharmaFooterNote"></div>
  </div>
  <a href="https://www.buymeacoffee.com/hugocc0825" target="_blank" rel="noopener noreferrer">
    <img class="buymeacoffee-img" src="https://cdn.buymeacoffee.com/buttons/v2/default-green.png" alt="Buy Me A Coffee">
  </a>
</div>

<script src="i18n.js"></script>
<script type="module" src="dharma.js"></script>
</body>
</html>
