<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>__MSG_optionsTitle__</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/options.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container options-container">
        <h1 class="page-header" data-i18n="optionsHeader"></h1>
        
        <section class="options-section">
            <h2 class="section-header" data-i18n="optionsDisplayLangSectionHeader"></h2>
            <label for="display-language" class="label" data-i18n="optionsDisplayLangLabel"></label>
            <select id="display-language" class="select-input">
                </select>
        </section>

        <hr class="divider">

        <section class="options-section">
            <h2 class="section-header" data-i18n="optionsPrefLangSectionHeader"></h2>
            <p class="description" data-i18n="optionsPrefLangDesc"></p>
            <div id="pref-lang-list">
                <!-- Row 0: Standard language select -->
                <div class="pref-lang-row" data-slot="0" data-type="select">
                    <div class="pref-lang-arrows">
                        <button class="pref-arrow" data-dir="up" disabled>↑</button>
                        <button class="pref-arrow" data-dir="down">↓</button>
                    </div>
                    <span class="pref-slot-num">1.</span>
                    <select class="pref-lang-value select-input"></select>
                </div>
                <!-- Row 1: Standard language select -->
                <div class="pref-lang-row" data-slot="1" data-type="select">
                    <div class="pref-lang-arrows">
                        <button class="pref-arrow" data-dir="up">↑</button>
                        <button class="pref-arrow" data-dir="down">↓</button>
                    </div>
                    <span class="pref-slot-num">2.</span>
                    <select class="pref-lang-value select-input"></select>
                </div>
                <!-- Row 2: Custom free-text language -->
                <div class="pref-lang-row" data-slot="2" data-type="custom">
                    <div class="pref-lang-arrows">
                        <button class="pref-arrow" data-dir="up">↑</button>
                        <button class="pref-arrow" data-dir="down" disabled>↓</button>
                    </div>
                    <span class="pref-slot-num">3.</span>
                    <div class="pref-custom-wrap">
                        <span class="pref-custom-tag" data-i18n="optionsPrefLangCustomLabel"></span>
                        <input type="text" class="pref-lang-value text-input"
                               data-i18n-placeholder="optionsPrefLangCustomPlaceholder">
                    </div>
                </div>
            </div>
        </section>

        <hr class="divider">

        <section class="options-section">
            <h2 class="section-header" data-i18n="optionsApiKeySectionHeader"></h2>
            <label for="api-key" class="label" data-i18n="optionsApiKeyLabel"></label>
            <input type="password" id="api-key" class="text-input">
        </section>

        <hr class="divider">

        <section class="options-section">
            <h2 class="section-header" data-i18n="optionsModelSectionHeader"></h2>
            <p class="description" data-i18n="optionsModelDesc"></p>
            <div class="space-y-4">
                <!-- Updated: Removed Lite models. Added 2.5 Flash as default. -->
                <div>
                    <input type="radio" name="model-select" id="gemini-2.5-flash" value="gemini-2.5-flash" class="sr-only" checked>
                    <label for="gemini-2.5-flash" class="model-card">
                         <div class="model-card-header">
                            <span class="model-name" data-i18n="optionsModelFlashName"></span>
                        </div>
                        <p class="model-id">gemini-2.5-flash</p>
                        <div class="model-desc" data-i18n="optionsModelFlashDesc"></div>
                    </label>
                </div>
            </div>
        </section>

        <hr class="divider">

        <section class="options-section">
            <h2 class="section-header" data-i18n="optionsPresetSectionHeader"></h2>
            <p class="description" data-i18n="optionsPresetDesc"></p>
            <p class="preset-tip" data-i18n="optionsPresetTip"></p>
            <div class="space-y-4">
                <div>
                    <label for="preset-prompt-a" class="label" data-i18n="optionsPresetLabelA"></label>
                    <textarea id="preset-prompt-a" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
                 <div>
                    <label for="preset-prompt-b" class="label" data-i18n="optionsPresetLabelB"></label>
                    <textarea id="preset-prompt-b" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
                 <div>
                    <label for="preset-prompt-c" class="label" data-i18n="optionsPresetLabelC"></label>
                    <textarea id="preset-prompt-c" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
                 <div>
                    <label for="preset-prompt-d" class="label" data-i18n="optionsPresetLabelD"></label>
                    <textarea id="preset-prompt-d" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
                 <div>
                    <label for="preset-prompt-e" class="label" data-i18n="optionsPresetLabelE"></label>
                    <textarea id="preset-prompt-e" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
                 <div>
                    <label for="preset-prompt-f" class="label" data-i18n="optionsPresetLabelF"></label>
                    <textarea id="preset-prompt-f" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
                 <div>
                    <label for="preset-prompt-g" class="label" data-i18n="optionsPresetLabelG"></label>
                    <textarea id="preset-prompt-g" rows="2" class="text-input" data-i18n-placeholder="optionsPresetPlaceholder"></textarea>
                </div>
            </div>
        </section>

        <hr class="divider">

        <section class="options-section">
            <h2 class="section-header" data-i18n="localModelSectionHeader"></h2>
            <p class="description" data-i18n="localModelDesc"></p>
            <div class="toggle-row">
                <label class="label" for="local-model-enabled" data-i18n="localModelEnabledLabel"></label>
                <input type="checkbox" id="local-model-enabled">
            </div>
            <div id="local-model-settings" class="space-y-4">
                <div>
                    <label for="local-model-endpoint" class="label" data-i18n="localModelEndpointLabel"></label>
                    <input type="text" id="local-model-endpoint" class="text-input"
                           data-i18n-placeholder="localModelEndpointPlaceholder">
                </div>
                <div>
                    <label for="local-model-name" class="label" data-i18n="localModelNameLabel"></label>
                    <input type="text" id="local-model-name" class="text-input"
                           data-i18n-placeholder="localModelNamePlaceholder">
                </div>
            </div>
        </section>

        <hr class="divider">

        <div class="save-area">
            <button id="save" class="submit-btn" data-i18n="optionsSaveButton"></button>
            <button id="reset" class="reset-btn" data-i18n="optionsResetButton"></button>
            <div id="status" class="status-text"></div>
        </div>

        <div class="options-footer">
            <a href="LICENSE" target="_blank" data-i18n="optionsLicenseLink"></a>
            &nbsp;|&nbsp;
            <a href="privacy.html" target="_blank" data-i18n="optionsPrivacyLink"></a>
        </div>
    </div>
    <script src="i18n.js"></script>
    <script type="module" src="options.js"></script>
</body>
</html>
